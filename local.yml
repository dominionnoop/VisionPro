version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        - CUDA_VERSION=${CUDA_VERSION:-12.1.0}
        - PYTORCH_CU_VERSION=${PYTORCH_CU_VERSION:-cu121}
    container_name: aatron_backend
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./server:/app
      # Mount model volumes or data if needed, similar to reference
    environment:
      - POSTGRES_DB=aatron_vision
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    command: /bin/bash -c "chmod +x migrate.sh && ./migrate.sh && pip install paho-mqtt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - postgres
      - redis
      - mqtt
    # GPU Configuration - using runtime for better compatibility
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: aatron_frontend
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true # Helps Docker filesystem watcher on Windows
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: aatron_postgres
    environment:
      POSTGRES_USER: aatron
      POSTGRES_PASSWORD: aatron_dev
      POSTGRES_DB: aatron_vision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aatron_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  mqtt:
    image: eclipse-mosquitto:2
    container_name: aatron_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
